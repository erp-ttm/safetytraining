<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TTM Safety Training System</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
  :root {
    --primary: #1a3a5c;
    --secondary: #e63946;
    --accent: #f4a261;
    --gold: #ffd700;
    --light-blue: #a8dadc;
    --bg-dark: #0d1b2a;
    --bg-mid: #1b2d42;
    --text-light: #e8f4f8;
    --card-bg: rgba(255,255,255,0.05);
    --glass: rgba(255,255,255,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Sarabun', sans-serif;
    background: var(--bg-dark);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Animated Background */
  .bg-animated {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 0;
    background: linear-gradient(135deg, #0d1b2a 0%, #1a3a5c 50%, #0d1b2a 100%);
  }

  .bg-animated::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 20% 50%, rgba(230,57,70,0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(244,162,97,0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 60% 80%, rgba(26,58,92,0.4) 0%, transparent 60%);
    animation: bgShift 8s ease-in-out infinite alternate;
  }

  @keyframes bgShift {
    0% { opacity: 0.6; transform: scale(1); }
    100% { opacity: 1; transform: scale(1.05); }
  }

  /* Particles */
  .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
  .particle {
    position: absolute; border-radius: 50%;
    background: rgba(168,218,220,0.3);
    animation: float linear infinite;
  }

  @keyframes float {
    0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 0.5; }
    100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
  }

  /* Safety Pattern */
  .safety-pattern {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 1; opacity: 0.03; pointer-events: none;
    background-image: repeating-linear-gradient(
      45deg, #ffd700 0px, #ffd700 2px, transparent 2px, transparent 20px
    );
  }

  /* Main Container */
  .login-wrapper {
    position: relative; z-index: 10;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 20px;
  }

  /* Header */
  .system-header {
    text-align: center; margin-bottom: 32px;
    animation: slideDown 0.8s ease-out;
  }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-40px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo-container {
    display: inline-flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 16px; padding: 12px 24px;
    margin-bottom: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }

  .logo-container img {
    height: 56px; width: auto;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
  }

  .system-title {
    color: var(--text-light);
    font-size: clamp(1.2rem, 3vw, 1.6rem);
    font-weight: 700; letter-spacing: 0.5px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    line-height: 1.4;
  }

  .system-subtitle {
    color: var(--accent);
    font-size: 0.9rem; font-weight: 500;
    margin-top: 4px; letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* Safety Badge */
  .safety-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: linear-gradient(135deg, #e63946, #c1121f);
    color: white; border-radius: 20px;
    padding: 4px 14px; font-size: 0.75rem; font-weight: 600;
    margin-top: 8px; letter-spacing: 0.5px;
    box-shadow: 0 2px 12px rgba(230,57,70,0.4);
    animation: pulse-badge 2s ease-in-out infinite;
  }

  @keyframes pulse-badge {
    0%, 100% { box-shadow: 0 2px 12px rgba(230,57,70,0.4); }
    50% { box-shadow: 0 2px 20px rgba(230,57,70,0.7); }
  }

  /* Login Card */
  .login-card {
    width: 100%; max-width: 420px;
    background: var(--glass);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 24px;
    padding: 36px 32px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
    animation: slideUp 0.8s ease-out 0.2s both;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .login-card-title {
    color: var(--text-light); font-weight: 700; font-size: 1.25rem;
    text-align: center; margin-bottom: 24px;
  }

  .login-card-title i { color: var(--accent); margin-right: 8px; }

  /* Form Controls */
  .form-label { color: rgba(232,244,248,0.8); font-size: 0.875rem; font-weight: 500; margin-bottom: 6px; }

  .input-group-custom {
    position: relative; margin-bottom: 18px;
  }

  .input-group-custom .input-icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: rgba(168,218,220,0.6); font-size: 0.9rem; z-index: 2;
    pointer-events: none;
  }

  .form-control-custom {
    width: 100%;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px; padding: 12px 14px 12px 40px;
    color: var(--text-light); font-family: 'Sarabun', sans-serif; font-size: 0.95rem;
    transition: all 0.3s ease; outline: none;
  }

  .form-control-custom:focus {
    background: rgba(255,255,255,0.1);
    border-color: var(--light-blue);
    box-shadow: 0 0 0 3px rgba(168,218,220,0.15);
  }

  .form-control-custom::placeholder { color: rgba(168,218,220,0.4); }

  .password-toggle {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: rgba(168,218,220,0.6);
    cursor: pointer; z-index: 3; padding: 0; font-size: 0.9rem;
    transition: color 0.2s;
  }

  .password-toggle:hover { color: var(--light-blue); }

  /* Login Button */
  .btn-login {
    width: 100%;
    background: linear-gradient(135deg, #e63946, #c1121f);
    border: none; border-radius: 12px;
    color: white; font-family: 'Sarabun', sans-serif;
    font-size: 1rem; font-weight: 700;
    padding: 13px; cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 20px rgba(230,57,70,0.4);
    letter-spacing: 0.5px;
    position: relative; overflow: hidden;
  }

  .btn-login::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
    opacity: 0; transition: opacity 0.3s;
  }

  .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(230,57,70,0.5); }
  .btn-login:hover::before { opacity: 1; }
  .btn-login:active { transform: translateY(0); }

  .btn-login.loading { pointer-events: none; opacity: 0.8; }

  /* Language Toggle */
  .lang-toggle {
    position: fixed; top: 20px; right: 20px; z-index: 100;
    display: flex; gap: 4px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 30px; padding: 4px;
  }

  .lang-btn {
    background: none; border: none; cursor: pointer;
    color: rgba(232,244,248,0.6); font-family: 'Sarabun', sans-serif;
    font-size: 0.8rem; font-weight: 600;
    padding: 6px 14px; border-radius: 24px;
    transition: all 0.3s; letter-spacing: 0.5px;
  }

  .lang-btn.active {
    background: var(--accent);
    color: white; box-shadow: 0 2px 10px rgba(244,162,97,0.4);
  }

  /* Alert */
  .alert-custom {
    border-radius: 12px; padding: 12px 16px;
    font-size: 0.875rem; font-weight: 500;
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 16px; animation: fadeIn 0.3s ease;
  }

  .alert-error { background: rgba(230,57,70,0.15); border: 1px solid rgba(230,57,70,0.3); color: #ff8fa3; }
  .alert-success { background: rgba(42,157,143,0.15); border: 1px solid rgba(42,157,143,0.3); color: #80ffe8; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

  /* Footer */
  .login-footer { text-align: center; margin-top: 20px; color: rgba(168,218,220,0.4); font-size: 0.78rem; }

  /* Divider */
  .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
  .divider-line { flex: 1; height: 1px; background: rgba(255,255,255,0.1); }
  .divider-text { color: rgba(168,218,220,0.4); font-size: 0.75rem; }

  /* Loading spinner */
  .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 480px) {
    .login-card { padding: 28px 20px; border-radius: 20px; }
  }
</style>
</head>
<body>

<!-- Background -->
<div class="bg-animated"></div>
<div class="safety-pattern"></div>
<div class="particles" id="particles"></div>

<!-- Language Toggle -->
<div class="lang-toggle">
  <button class="lang-btn active" onclick="setLang('th')" id="langTH">TH</button>
  <button class="lang-btn" onclick="setLang('en')" id="langEN">EN</button>
</div>

<!-- Main -->
<div class="login-wrapper">

  <!-- Header -->
  <div class="system-header">
    <div class="logo-container">
      <img src="https://ttm-jda.com/themes/default/images/all/logo/pic_logo.png" alt="TTM Logo" onerror="this.style.display='none'">
    </div>
    <div class="system-title" data-th="ระบบอบรมความปลอดภัยสำหรับผู้รับเหมาฯ TTM" data-en="TTM Safety Training System for Contractors">ระบบอบรมความปลอดภัยสำหรับผู้รับเหมาฯ TTM</div>
    <div class="system-subtitle" data-th="ระบบการจัดการอบรมความปลอดภัย" data-en="Safety Training Management System">ระบบการจัดการอบรมความปลอดภัย</div>
    <div style="margin-top:10px">
      <span class="safety-badge">
        <i class="fa fa-shield-halved"></i>
        <span data-th="ความปลอดภัยมาก่อน" data-en="Safety First">ความปลอดภัยมาก่อน</span>
      </span>
    </div>
  </div>

  <!-- Login Card -->
  <div class="login-card">
    <div class="login-card-title">
      <i class="fa fa-right-to-bracket"></i>
      <span data-th="เข้าสู่ระบบ" data-en="Sign In">เข้าสู่ระบบ</span>
    </div>

    <div id="alertBox"></div>

    <div class="input-group-custom">
      <i class="fa fa-user input-icon"></i>
      <input type="text" id="username" class="form-control-custom" placeholder="Username" autocomplete="username">
    </div>

    <div class="input-group-custom" style="position:relative">
      <i class="fa fa-lock input-icon"></i>
      <input type="password" id="password" class="form-control-custom" placeholder="Password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
      <button class="password-toggle" onclick="togglePassword()" title="Show/Hide password" tabindex="-1">
        <i class="fa fa-eye" id="pwdEyeIcon"></i>
      </button>
    </div>

    <button class="btn-login" id="loginBtn" onclick="doLogin()">
      <i class="fa fa-sign-in-alt me-2"></i>
      <span data-th="เข้าสู่ระบบ" data-en="Sign In">เข้าสู่ระบบ</span>
    </button>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text" data-th="ระบบอบรมความปลอดภัย" data-en="Safety Training System">ระบบอบรมความปลอดภัย</span>
      <div class="divider-line"></div>
    </div>

    <div style="text-align:center; color:rgba(168,218,220,0.5); font-size:0.8rem;">
      <i class="fa fa-info-circle me-1" style="color:var(--accent)"></i>
      <span data-th="ติดต่อผู้ดูแลระบบเพื่อขอรหัสผ่าน" data-en="Contact admin to get your account">ติดต่อผู้ดูแลระบบเพื่อขอรหัสผ่าน</span>
    </div>
  </div>

  <div class="login-footer">
    <i class="fa fa-copyright me-1"></i>
    TTM Safety Training System &nbsp;|&nbsp; Powered by Google Apps Script
  </div>
</div>

<script>
  // ==========================================
  // PARTICLES
  // ==========================================
  (function() {
    const container = document.getElementById('particles');
    for (let i = 0; i < 25; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 6 + 2;
      p.style.cssText = `
        width:${size}px; height:${size}px;
        left:${Math.random()*100}%;
        animation-duration:${Math.random()*15+10}s;
        animation-delay:${Math.random()*10}s;
        opacity:${Math.random()*0.5+0.1};
      `;
      container.appendChild(p);
    }
  })();

  // ==========================================
  // LANGUAGE
  // ==========================================
  let currentLang = localStorage.getItem('ttm_lang') || 'th';

  function setLang(lang) {
    currentLang = lang;
    localStorage.setItem('ttm_lang', lang);
    document.querySelectorAll('[data-th]').forEach(el => {
      el.textContent = lang === 'th' ? el.dataset.th : el.dataset.en;
    });
    document.getElementById('langTH').classList.toggle('active', lang === 'th');
    document.getElementById('langEN').classList.toggle('active', lang === 'en');
    document.getElementById('username').placeholder = lang === 'th' ? 'ชื่อผู้ใช้' : 'Username';
    document.getElementById('password').placeholder = lang === 'th' ? 'รหัสผ่าน' : 'Password';
  }

  setLang(currentLang);

  // ==========================================
  // PASSWORD TOGGLE
  // ==========================================
  function togglePassword() {
    const pwd = document.getElementById('password');
    const icon = document.getElementById('pwdEyeIcon');
    if (pwd.type === 'password') {
      pwd.type = 'text';
      icon.className = 'fa fa-eye-slash';
    } else {
      pwd.type = 'password';
      icon.className = 'fa fa-eye';
    }
  }

  // ==========================================
  // ALERT
  // ==========================================
  function showAlert(msg, type) {
    const box = document.getElementById('alertBox');
    const icon = type === 'error' ? 'fa-circle-exclamation' : 'fa-circle-check';
    box.innerHTML = `<div class="alert-custom alert-${type}"><i class="fa ${icon}"></i>${msg}</div>`;
    setTimeout(() => { box.innerHTML = ''; }, 4000);
  }

  // ==========================================
  // LOGIN
  // ==========================================
  function doLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');

    if (!username || !password) {
      showAlert(
        currentLang === 'th' ? 'กรุณากรอกชื่อผู้ใช้และรหัสผ่าน' : 'Please enter username and password',
        'error'
      );
      return;
    }

    // Loading state
    btn.classList.add('loading');
    btn.innerHTML = '<span class="spinner"></span>' + (currentLang === 'th' ? 'กำลังเข้าสู่ระบบ...' : 'Signing in...');

    google.script.run
      .withSuccessHandler(function(result) {
        btn.classList.remove('loading');
        btn.innerHTML = '<i class="fa fa-sign-in-alt me-2"></i>' + (currentLang === 'th' ? 'เข้าสู่ระบบ' : 'Sign In');

        if (result.success) {
          // Store session
          sessionStorage.setItem('ttm_user', JSON.stringify(result));
          sessionStorage.setItem('ttm_lang', currentLang);

          showAlert(
            currentLang === 'th' ? `ยินดีต้อนรับ, ${result.displayName}` : `Welcome, ${result.displayName}`,
            'success'
          );

          setTimeout(() => {
            if (result.role === 'admin') {
              window.location.href = '?page=admin';
            } else {
              window.location.href = '?page=user';
            }
          }, 800);
        } else {
          showAlert(
            currentLang === 'th' ? 'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง' : 'Invalid username or password',
            'error'
          );
        }
      })
      .withFailureHandler(function(err) {
        btn.classList.remove('loading');
        btn.innerHTML = '<i class="fa fa-sign-in-alt me-2"></i>' + (currentLang === 'th' ? 'เข้าสู่ระบบ' : 'Sign In');
        showAlert('System error: ' + err.message, 'error');
      })
      .login(username, password);
  }
</script>
</body>
</html>
